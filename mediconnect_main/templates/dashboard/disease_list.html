{% extends "dashboard/base.html" %}
{% block content %}
<div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
  <h2 class="mb-0">Diseases</h2>
  <div class="d-flex gap-2">
    <form method="get" class="d-flex gap-2">
      <input class="form-control" style="min-width:220px" name="q" value="{{ q }}" placeholder="Search disease">
      <button class="btn btn-outline-dark" type="submit">Search</button>
    </form>
    <a class="btn btn-dark" href="{% url 'dashboard:disease_create' %}">Create</a>
  </div>
</div>

<div class="card">
  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle mb-0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for d in page.object_list %}
          <tr>
            <td>{{ d.id }}</td>
            <td>{{ d.name }}</td>
            <td class="text-end">
              <a class="btn btn-sm btn-outline-dark" href="{% url 'dashboard:disease_edit' d.id %}">Edit</a>
              <a class="btn btn-sm btn-outline-danger" href="{% url 'dashboard:disease_delete' d.id %}">Delete</a>
            </td>
          </tr>
        {% empty %}
          <tr><td colspan="3" class="text-center text-muted p-4">No diseases.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% include "dashboard/pagination.html" with page=page q=q %}
{% endblock %}
