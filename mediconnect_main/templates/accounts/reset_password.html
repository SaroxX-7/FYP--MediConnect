{% extends 'base.html' %}
{% block content %}

<div class="main-section">
    <div class="page-section nopadding cs-nomargin" style="margin-top: 0px;padding-top: 60px;padding-bottom: 60px;margin-bottom: 0px;">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12 ">
                    <div class="user-dashboard loader-holder" style="width: 450px; min-height: auto;">
                        <div class="user-holder">
                    <h4 class="text-center" style="margin-bottom: 0;">RESET YOUR PASSWORD</h4>

                    <hr>
                    <div id="restaurant-sets-holder">
                        <form action="{% url 'reset_password' %}" class="form-fields-set foodbakery-dev-restaurant-form" method="post" enctype="multipart/form-data">
                            {% csrf_token %}

                                                    <div class="form-group form-focus">
                                                        <input type="password" name="password" class="form-control floating" required>
                                                        <label class="focus-label">Enter New Password</label>
                                                    </div>
                                                <div class="form-group form-focus">
                                                        <input type="password" name="confirm_password" class="form-control floating" required>
                                                        <label class="focus-label">Confirm New Password</label>
                                                    </div>

                                    <div class="row">
                                        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                                            <div class="field-holder">
                                                <div class="payment-holder">
                                                    <button class="btn btn-primary btn-block btn-lg login-btn" type="submit">Reset Password</button>
{#                                                    <input type="submit" value="Reset Password" id="btn-next-restaurant-information" class="bgcolor">#}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                                            <!-- Load message -->
                                        </div>
                                    </div>
                        </form>
                    </div>
                </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
