{% extends 'base.html' %}
{% load static %}
{% block content %}

<style>
    /* ==============================
       MEDICONNECT RESET PASSWORD - CLEAN WHITE MODERN UI
       Fully responsive, elegant design
    ============================== */

    :root {
        --primary: #0f6fff;
        --primary-dark: #0b57cc;
        --primary-light: #3b82f6;
        --secondary: #00c2a8;
        --accent: #8b5cf6;
        --text-dark: #1e293b;
        --text-muted: #64748b;
        --text-light: #94a3b8;
        --border-light: #e2e8f0;
        --card-bg: #ffffff;
        --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.04);
        --shadow-md: 0 20px 38px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 35px 60px rgba(0, 0, 0, 0.1);
        --radius-xl: 32px;
        --radius-lg: 24px;
        --radius-md: 18px;
        --transition-smooth: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    /* Page background - clean white */
    .main-section {
        background: #ffffff;
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
    }

    .page-section {
        padding: 60px 0 !important;
        width: 100%;
    }

    /* Center the reset card */
    .user-dashboard {
        margin: 0 auto;
        width: 100%;
        max-width: 500px;
        background: var(--card-bg);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
        transition: var(--transition-smooth);
        border: 1px solid var(--border-light);
    }

    .user-dashboard:hover {
        transform: translateY(-5px);
        box-shadow: 0 45px 70px rgba(0, 0, 0, 0.12);
    }

    .user-holder {
        padding: 40px 35px;
    }

    /* Header styling */
    h4.text-center {
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--text-dark);
        letter-spacing: -0.5px;
        margin-bottom: 0 !important;
        text-align: center;
    }

    hr {
        margin: 20px 0 30px;
        border: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border-light), transparent);
    }

    /* Form group - floating labels */
    .form-group {
        margin-bottom: 24px;
        position: relative;
    }

    .form-focus {
        position: relative;
    }

    .form-focus .form-control {
        width: 100%;
        height: 64px;
        border-radius: 20px;
        border: 2px solid var(--border-light);
        background: #ffffff;
        padding: 22px 20px 8px;
        font-size: 1rem;
        font-weight: 500;
        color: var(--text-dark);
        transition: var(--transition-smooth);
        box-shadow: var(--shadow-sm);
    }

    .form-focus .form-control:hover {
        border-color: rgba(15, 111, 255, 0.4);
    }

    .form-focus .form-control:focus {
        border-color: var(--primary);
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(15, 111, 255, 0.1);
        outline: none;
    }

    .form-focus .focus-label {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        margin: 0;
        padding: 0 6px;
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--text-light);
        background: transparent;
        pointer-events: none;
        transition: var(--transition-smooth);
    }

    .form-focus .form-control:focus ~ .focus-label,
    .form-focus .form-control:not(:placeholder-shown) ~ .focus-label {
        top: 0;
        transform: translateY(-50%);
        background: #ffffff;
        color: var(--primary);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.3px;
        border-radius: 30px;
        padding: 0 8px;
    }

    .form-control::placeholder {
        color: transparent;
    }

    /* Button styling */
    .login-btn {
        width: 100%;
        border: none;
        border-radius: 999px;
        padding: 16px 24px;
        font-size: 1.02rem;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: #fff;
        background: linear-gradient(105deg, var(--primary), var(--primary-dark), var(--secondary));
        background-size: 200% auto;
        box-shadow: 0 10px 25px rgba(15, 111, 255, 0.25);
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        margin-top: 10px;
    }

    .login-btn:hover {
        transform: translateY(-3px);
        background-position: right center;
        box-shadow: 0 18px 35px rgba(15, 111, 255, 0.3);
    }

    .login-btn:active {
        transform: translateY(-1px);
    }

    .login-btn:focus {
        outline: none;
        box-shadow: 0 0 0 4px rgba(15, 111, 255, 0.15), 0 10px 25px rgba(15, 111, 255, 0.25);
    }

    /* Shine effect on button */
    .login-btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -150%;
        width: 120%;
        height: 100%;
        background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
        transform: skewX(-25deg);
        transition: 0.7s;
    }

    .login-btn:hover::before {
        left: 150%;
    }

    /* Ripple effect for button */
    .login-btn .ripple {
        position: absolute;
        border-radius: 50%;
        transform: scale(0);
        animation: rippleEffect 0.6s linear;
        background-color: rgba(255, 255, 255, 0.4);
        pointer-events: none;
    }

    @keyframes rippleEffect {
        to {
            transform: scale(6);
            opacity: 0;
        }
    }

    /* Messages styling */
    .error-message,
    .success-message {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        border-radius: 20px;
        margin-bottom: 20px;
        font-size: 0.9rem;
        font-weight: 600;
        animation: slideDown 0.4s ease;
    }

    .error-message {
        color: #dc2626;
        background: #fef2f2;
        border-left: 4px solid #dc2626;
        box-shadow: var(--shadow-sm);
    }

    .success-message {
        color: #059669;
        background: #ecfdf5;
        border-left: 4px solid #059669;
        box-shadow: var(--shadow-sm);
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-15px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Password strength indicator */
    .password-strength {
        margin-top: 8px;
        font-size: 0.75rem;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .strength-bar {
        height: 4px;
        flex: 1;
        background: #e2e8f0;
        border-radius: 4px;
        overflow: hidden;
    }

    .strength-bar-fill {
        height: 100%;
        width: 0%;
        transition: width 0.3s ease, background 0.3s ease;
        border-radius: 4px;
    }

    .strength-text {
        color: var(--text-muted);
        font-weight: 500;
    }

    /* Password match indicator */
    .password-match {
        margin-top: 8px;
        font-size: 0.75rem;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .match-success {
        color: #059669;
    }

    .match-error {
        color: #dc2626;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }

    ::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
    }

    /* Remove number input arrows */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }


    /* Responsive design */
    @media (max-width: 768px) {
        .page-section {
            padding: 40px 20px !important;
        }

        .user-holder {
            padding: 30px 25px;
        }

        h4.text-center {
            font-size: 1.5rem;
        }

        .form-focus .form-control {
            height: 56px;
            padding: 20px 16px 8px;
            font-size: 0.95rem;
            border-radius: 16px;
        }

        .form-focus .focus-label {
            left: 16px;
            font-size: 0.9rem;
        }

        .login-btn {
            padding: 14px 20px;
            font-size: 0.96rem;
        }
    }

    @media (max-width: 480px) {
        .user-dashboard {
            max-width: 100%;
        }

        .user-holder {
            padding: 25px 20px;
        }

        h4.text-center {
            font-size: 1.35rem;
        }

        hr {
            margin: 15px 0 22px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-focus .form-control {
            height: 52px;
            padding: 18px 14px 6px;
            border-radius: 14px;
        }

        .form-focus .focus-label {
            left: 14px;
            font-size: 0.85rem;
        }

        .form-focus .form-control:focus ~ .focus-label,
        .form-focus .form-control:not(:placeholder-shown) ~ .focus-label {
            font-size: 0.65rem;
        }

        .login-btn {
            padding: 12px 18px;
            font-size: 0.9rem;
        }
    }

    /* Focus visible for accessibility */
    .form-focus .form-control:focus-visible {
        outline: 2px solid var(--primary);
        outline-offset: 2px;
    }

    .login-btn:focus-visible {
        outline: 2px solid var(--primary);
        outline-offset: 2px;
    }

    /* Additional hover effect for form groups */
    .form-group:hover .focus-label:not(.form-control:focus ~ .focus-label) {
        color: var(--primary-light);
    }

    /* Field-holder spacing */
    .field-holder {
        margin-top: 10px;
    }

    .payment-holder {
        width: 100%;
    }
</style>

<div class="main-section">
    <div class="page-section nopadding cs-nomargin" style="margin-top: 0px;padding-top: 60px;padding-bottom: 60px;margin-bottom: 0px;">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                    <div class="user-dashboard loader-holder" style="width: 450px; min-height: auto; margin: 0 auto;">
                        <div class="user-holder">
                            <h4 class="text-center" style="margin-bottom: 0;">RESET YOUR PASSWORD</h4>
                            <hr>
                            <div id="restaurant-sets-holder">
                                <!-- Display Django messages if any -->
                                {% if messages %}
                                    {% for message in messages %}
                                        <div class="{% if message.tags == 'error' %}error-message{% else %}success-message{% endif %}">
                                            {% if message.tags == 'error' %}
                                                <span>⚠️</span>
                                            {% else %}
                                                <span>✓</span>
                                            {% endif %}
                                            {{ message }}
                                        </div>
                                    {% endfor %}
                                {% endif %}

                                <form action="{% url 'reset_password' %}" class="form-fields-set foodbakery-dev-restaurant-form" method="post" enctype="multipart/form-data">
                                    {% csrf_token %}

                                    <div class="form-group form-focus">
                                        <input type="password" name="password" id="password" class="form-control floating" placeholder=" " required>
                                        <label class="focus-label">Enter New Password</label>
                                    </div>
                                    
                                    <!-- Password strength indicator -->
                                    <div class="password-strength" id="passwordStrength">
                                        <div class="strength-bar">
                                            <div class="strength-bar-fill" id="strengthFill"></div>
                                        </div>
                                        <span class="strength-text" id="strengthText">Enter password</span>
                                    </div>

                                    <div class="form-group form-focus">
                                        <input type="password" name="confirm_password" id="confirmPassword" class="form-control floating" placeholder=" " required>
                                        <label class="focus-label">Confirm New Password</label>
                                    </div>
                                    
                                    <!-- Password match indicator -->
                                    <div class="password-match" id="matchIndicator" style="display: none;">
                                        <span id="matchIcon"></span>
                                        <span id="matchText"></span>
                                    </div>

                                    <div class="row">
                                        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                                            <div class="field-holder">
                                                <div class="payment-holder">
                                                    <button class="btn btn-primary btn-block btn-lg login-btn" type="submit" id="resetBtn">Reset Password</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                                            <!-- Load message -->
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Handle floating labels on page load
        const floatingInputs = document.querySelectorAll('.form-focus .form-control');
        
        floatingInputs.forEach(input => {
            if (input.value.trim() !== '') {
                input.classList.add('filled');
            }
            
            input.addEventListener('input', function() {
                if (this.value.trim() !== '') {
                    this.classList.add('filled');
                } else {
                    this.classList.remove('filled');
                }
            });
        });
        
        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const confirmInput = document.getElementById('confirmPassword');
        const matchIndicator = document.getElementById('matchIndicator');
        const matchIcon = document.getElementById('matchIcon');
        const matchText = document.getElementById('matchText');
        const resetBtn = document.getElementById('resetBtn');
        
        function checkPasswordStrength(password) {
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            let percentage = (strength / 4) * 100;
            let color, text;
            
            if (password.length === 0) {
                color = '#e2e8f0';
                text = 'Enter password';
                percentage = 0;
            } else if (strength === 1) {
                color = '#ef4444';
                text = 'Weak';
            } else if (strength === 2) {
                color = '#f59e0b';
                text = 'Fair';
            } else if (strength === 3) {
                color = '#10b981';
                text = 'Good';
            } else {
                color = '#059669';
                text = 'Strong';
            }
            
            strengthFill.style.width = percentage + '%';
            strengthFill.style.backgroundColor = color;
            strengthText.textContent = text;
            strengthText.style.color = color;
            
            return strength;
        }
        
        function checkPasswordMatch() {
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            
            if (confirm.length === 0) {
                matchIndicator.style.display = 'none';
                return false;
            }
            
            matchIndicator.style.display = 'flex';
            
            if (password === confirm && password.length > 0) {
                matchIcon.innerHTML = '✓';
                matchText.innerHTML = 'Passwords match';
                matchIcon.style.color = '#059669';
                matchText.style.color = '#059669';
                return true;
            } else {
                matchIcon.innerHTML = '✗';
                matchText.innerHTML = 'Passwords do not match';
                matchIcon.style.color = '#dc2626';
                matchText.style.color = '#dc2626';
                return false;
            }
        }
        
        passwordInput.addEventListener('input', function() {
            checkPasswordStrength(this.value);
            checkPasswordMatch();
        });
        
        confirmInput.addEventListener('input', function() {
            checkPasswordMatch();
        });
        
        // Form validation before submit
        const resetForm = document.querySelector('form');
        resetForm.addEventListener('submit', function(e) {
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            
            if (password !== confirm) {
                e.preventDefault();
                matchIndicator.style.display = 'flex';
                matchIcon.innerHTML = '✗';
                matchText.innerHTML = 'Passwords do not match';
                matchIcon.style.color = '#dc2626';
                matchText.style.color = '#dc2626';
                
                // Add shake animation to confirm field
                confirmInput.style.borderColor = '#dc2626';
                setTimeout(() => {
                    confirmInput.style.borderColor = '';
                }, 2000);
                return false;
            }
            
            if (password.length < 6) {
                e.preventDefault();
                passwordInput.style.borderColor = '#dc2626';
                setTimeout(() => {
                    passwordInput.style.borderColor = '';
                }, 2000);
                return false;
            }
            
            // Add ripple effect
            const btn = resetBtn;
            let ripple = document.createElement('span');
            ripple.classList.add('ripple');
            btn.appendChild(ripple);
            
            let rect = btn.getBoundingClientRect();
            ripple.style.left = (rect.width / 2) + 'px';
            ripple.style.top = (rect.height / 2) + 'px';
            
            setTimeout(() => {
                ripple.remove();
            }, 600);
        });
        
        // Add ripple effect on button click
        resetBtn.addEventListener('click', function(e) {
            if (!resetForm.checkValidity()) return;
            let ripple = document.createElement('span');
            ripple.classList.add('ripple');
            this.appendChild(ripple);
            
            let x = e.clientX - e.target.offsetLeft;
            let y = e.clientY - e.target.offsetTop;
            
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            
            setTimeout(() => {
                ripple.remove();
            }, 600);
        });
    });
</script>

{% endblock %}
