{% load static %}

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta
          name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0,user-scalable=no"
        />
        <title>LifeLink</title>

        <link type="image/x-icon" href="{% static 'img/favicon.png' %}" rel="icon">

		<!-- Bootstrap CSS -->
        <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

        <!-- Fontawesome CSS -->
        <link rel="stylesheet" href="{% static 'plugins/fontawesome/css/fontawesome.min.css' %}">
        <link rel="stylesheet" href="{% static 'plugins/fontawesome/css/all.min.css' %}">

        <!-- Main CSS -->
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
            <!-- Link to Viewer.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.10.5/viewer.min.css" crossorigin="anonymous">


        <!--[if lt IE 9]>
        <script src="{% static 'js/html5shiv.min.js' %}"></script>
        <script src="{% static 'js/respond.min.js' %}"></script>
        <![endif]-->

    <!-- jQuery -->
    <script src="{% static 'js/jquery.min.js' %}"></script>

    <!-- Popper.js (for Bootstrap 4) -->
    <script src="{% static 'js/popper.min.js' %}"></script>

    <!-- Bootstrap JS -->
    <script src="{% static 'js/bootstrap.min.js' %}"></script>

    </head>
    <body>

    {% include 'includes/navbar.html' %}

    {% block content %}
    {% endblock %}

    {% include 'includes/footer.html' %}

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>

        <!-- Custom JS -->
    <script src="{% static 'js/script.js' %}"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key={{GOOGLE_API_KEY}}&libraries=places&callback=initAutoComplete" defer></script>
    <script src="{% static 'js/custom.js' %}"></script>
    <!-- Include Toastr CSS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet"/>
    <!-- Link to Viewer.js JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.10.5/viewer.min.js" crossorigin="anonymous"></script>




    <!-- Other JavaScript files -->
    <script src="{% static 'js/profile-settings.js' %}"></script>
    <script src="{% static 'plugins/theia-sticky-sidebar/ResizeSensor.js' %}"></script>
    <script src="{% static 'plugins/theia-sticky-sidebar/theia-sticky-sidebar.js' %}"></script>
    <script src="{% static 'plugins/select2/js/select2.min.js' %}"></script>
    <script src="{% static 'plugins/dropzone/dropzone.min.js' %}"></script>
    <script src="{% static 'plugins/bootstrap-tagsinput/js/bootstrap-tagsinput.js' %}"></script>


<!-- At the end of the body, include Toastr JS -->
<script src="https://cdn.jsdelivr.net/npm/toastr@2.1.4/toastr.min.js"></script>
<script>
toastr.options = {
    "closeButton": true,
    "debug": false,
    "newestOnTop": false,
    "progressBar": true,
    "positionClass": "toast-top-right",
    "preventDuplicates": true,
    "onclick": null,
    "showDuration": "300",
    "hideDuration": "1000",
    "timeOut": "5000",
    "extendedTimeOut": "1000",
    "showEasing": "swing",
    "hideEasing": "linear",
    "showMethod": "fadeIn",
    "hideMethod": "fadeOut"
};
</script>

<!-- This section will be processed by Django on the server -->
<script>
{% if messages %}
    {% for message in messages %}
        var messageText = '{{ message|escapejs }}';
        var messageTag = '{{ message.tags|escapejs }}';
        var toastType = messageTag;

        if (messageTag === 'danger') {
            toastType = 'error';
        } else if (messageTag === 'success') {
            toastType = 'success';
        }

        toastr[toastType](messageText);
    {% endfor %}
{% endif %}
</script>


    </body>
</html>
